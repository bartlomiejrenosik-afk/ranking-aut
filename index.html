<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prywatny ranking samochodów</title>
<style>
:root{font-family:Arial,sans-serif;color:#172033;background:#f5f7fb}*{box-sizing:border-box}body{margin:0}.wrap{max-width:1500px;margin:auto;padding:28px}.hidden{display:none!important}
.card,.modalbox{background:#fff;border:1px solid #e4e7ec;border-radius:16px;box-shadow:0 10px 30px #10182814}.card{max-width:420px;margin:10vh auto;padding:28px}
input,select,button{border:1px solid #d0d5dd;border-radius:10px;padding:11px 13px;font-size:14px}input{width:100%}button{cursor:pointer;background:#172033;color:#fff;font-weight:700}
.field{margin:14px 0}.muted{color:#667085}.error{color:#b42318;margin-top:12px}.top,.toolbar,.modalhead{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.toolbar{justify-content:flex-start;margin:18px 0}.toolbar input{width:280px}
.status{background:#fff;padding:12px;margin-bottom:16px;border-radius:10px}.tablebox{background:#fff;border:1px solid #e4e7ec;border-radius:14px;overflow:auto}table{width:100%;border-collapse:collapse;min-width:1250px}th,td{padding:12px;border-bottom:1px solid #eaecf0;text-align:left;white-space:nowrap}th{font-size:12px;color:#667085;background:#f9fafb}.clickable{cursor:pointer}.clickable:hover{background:#f9fafb}
.badge{padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700}.LOW,.BUY{background:#dcfae6;color:#067647}.MEDIUM,.BUY_WITH_CAUTION,.ONLY_IF_CHEAP{background:#fef0c7;color:#b54708}.HIGH,.SKIP{background:#fee4e2;color:#b42318}.positive{color:#067647;font-weight:700}
.modal{position:fixed;inset:0;background:#10182899;padding:30px;overflow:auto;z-index:10}.modalbox{max-width:1050px;margin:auto;padding:24px}.close,.logout{background:#fff;color:#172033}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:18px 0}.stat{background:#f9fafb;padding:12px;border-radius:12px}.stat small{display:block;color:#667085}.detail{margin-top:24px}.detail table{min-width:700px}
.hero{padding:20px;border:1px solid #e4e7ec;border-radius:16px;background:linear-gradient(135deg,#fff,#f9fafb)}
.heroTop{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
.hero h2{margin:0 0 6px}.decisionBox{padding:10px 14px;border-radius:12px;font-weight:800}
.sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:12px}
.riskList{display:grid;gap:10px}.riskItem{padding:12px 14px;border-radius:12px;border-left:5px solid #d0d5dd;background:#f9fafb}
.riskItem.HIGH{border-left-color:#b42318}.riskItem.MEDIUM{border-left-color:#b54708}.riskItem.LOW{border-left-color:#067647}
.pill{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800}
.yes{background:#fee4e2;color:#b42318}.no{background:#dcfae6;color:#067647}
.paintHigh{font-weight:800;color:#b42318}.treadLow{font-weight:800;color:#b54708}
@media(max-width:700px){.modal{padding:10px}.modalbox{padding:16px}.grid{grid-template-columns:1fr 1fr}}
</style></head><body>
<section id="login" class="card"><h1>Logowanie</h1><p class="muted">Prywatny ranking samochodów</p><form id="form"><div class="field"><label>E-mail</label><input id="email" type="email" required></div><div class="field"><label>Hasło</label><input id="password" type="password" required></div><button>Zaloguj się</button><div id="err" class="error"></div></form></section>
<main id="app" class="wrap hidden"><div class="top"><div><h1>Ranking samochodów aukcyjnych</h1><p class="muted">Kliknij samochód, aby zobaczyć pełną kartę</p></div><button id="logout" class="logout">Wyloguj</button></div><div class="toolbar"><input id="search" placeholder="Szukaj…"><select id="risk"><option value="">Wszystkie ryzyka</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option></select></div><div id="status" class="status">Ładowanie…</div><div class="tablebox"><table><thead><tr><th>#</th><th>Samochód</th><th>Rok</th><th>Przebieg</th><th>Rejestracja</th><th>Cena aukcji</th><th>Limit</th><th>Szybka sprzedaż</th><th>Zysk min.</th><th>Zysk max.</th><th>Ocena</th><th>Ryzyko</th><th>Decyzja</th></tr></thead><tbody id="rows"></tbody></table></div></main>
<div id="modal" class="modal hidden"><div class="modalbox"><div class="modalhead"><div><h2 id="title"></h2><p id="reg" class="muted"></p></div><button id="close" class="close">✕</button></div><div id="body">Ładowanie…</div></div></div>
<script>
const BASE='https://rrtgndxhqmefezwpjpnd.supabase.co',KEY='sb_publishable_IY5STYDCWtRIM6-UVCfg4Q_sXn-jQI5';let token=null,cars=[];
const pln=n=>n==null?'—':new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:0}).format(n),num=n=>new Intl.NumberFormat('pl-PL').format(n??0),esc=s=>String(s??'—').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const dec={BUY:'KUP',BUY_WITH_CAUTION:'KUP OSTROŻNIE',ONLY_IF_CHEAP:'TYLKO TANIO',SKIP:'ODPUŚĆ'};
async function req(path){let r=await fetch(`${BASE}/rest/v1/${path}`,{headers:{apikey:KEY,Authorization:`Bearer ${token}`}});if(!r.ok)throw Error(await r.text());return r.json()}
function showApp(x){login.classList.toggle('hidden',x);app.classList.toggle('hidden',!x)}
function render(){let q=search.value.toLowerCase(),r=risk.value,f=cars.filter(c=>(!r||c.risk_level===r)&&`${c.brand} ${c.model} ${c.registration_number}`.toLowerCase().includes(q));rows.innerHTML=f.map(c=>`<tr class="clickable" data-id="${c.vehicle_id}"><td><b>#${c.ranking}</b></td><td><b>${esc(c.brand)} ${esc(c.model)}</b></td><td>${c.production_year}</td><td>${num(c.mileage)} km</td><td>${esc(c.registration_number)}</td><td>${pln(c.auction_price)}</td><td>${pln(c.max_purchase_price)}</td><td>${pln(c.quick_sale_price_min)}–${pln(c.quick_sale_price_max)}</td><td class="positive">${pln(c.potential_profit_min)}</td><td class="positive">${pln(c.potential_profit_max)}</td><td>${c.overall_condition_score}/10</td><td><span class="badge ${c.risk_level}">${c.risk_level}</span></td><td><span class="badge ${c.purchase_decision}">${dec[c.purchase_decision]||c.purchase_decision}</span></td></tr>`).join('');status.textContent=`Wyświetlono ${f.length} z ${cars.length} samochodów`;document.querySelectorAll('[data-id]').forEach(x=>x.onclick=()=>openCar(x.dataset.id))}
function tbl(a,cols){if(!a.length)return'<p class="muted">Brak danych.</p>';return`<div class="tablebox"><table><thead><tr>${cols.map(x=>`<th>${x[0]}</th>`).join('')}</tr></thead><tbody>${a.map(o=>`<tr>${cols.map(x=>`<td>${esc(o[x[1]])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
async function openCar(id){let c=cars.find(x=>x.vehicle_id===id);modal.classList.remove('hidden');title.textContent=`${c.brand} ${c.model}`;reg.textContent=`${c.production_year} • ${c.registration_number} • ${num(c.mileage)} km`;body.textContent='Ładowanie szczegółów…';try{let[d,t,p]=await Promise.all([req(`damages?vehicle_id=eq.${id}&select=category,element,description,severity&order=id`),req(`tyres?vehicle_id=eq.${id}&select=position,brand,model,size,tread_depth_mm&order=id`),req(`paint_measurements?vehicle_id=eq.${id}&select=element,thickness_min_um,thickness_max_um,painted,repaired,notes&order=id`)]);let high=d.filter(x=>x.severity==='HIGH'),medium=d.filter(x=>x.severity==='MEDIUM');
let pos={FRONT_LEFT:'Przód lewy',FRONT_RIGHT:'Przód prawy',REAR_LEFT:'Tył lewy',REAR_RIGHT:'Tył prawy',SPARE:'Koło zapasowe'};
t=t.map(x=>({...x,position:pos[x.position]||x.position,tread_depth_mm:x.tread_depth_mm==null?'—':x.tread_depth_mm+' mm'}));
p=p.map(x=>({...x,painted:x.painted===true?'Tak':x.painted===false?'Nie':'—',repaired:x.repaired===true?'Tak':x.repaired===false?'Nie':'—'}));
body.innerHTML=`<div class="hero"><div class="heroTop"><div><h2>#${c.ranking} ${esc(c.brand)} ${esc(c.model)}</h2><div class="muted">${c.production_year} • ${num(c.mileage)} km • ${esc(c.registration_number)}</div></div><div class="decisionBox badge ${c.purchase_decision}">${dec[c.purchase_decision]||c.purchase_decision}</div></div>
<div class="grid"><div class="stat"><small>Cena aukcji</small><b>${pln(c.auction_price)}</b></div><div class="stat"><small>Limit zakupu</small><b>${pln(c.max_purchase_price)}</b></div><div class="stat"><small>Szybka sprzedaż</small><b>${pln(c.quick_sale_price_min)}–${pln(c.quick_sale_price_max)}</b></div><div class="stat"><small>Potencjalny zysk</small><b class="positive">${pln(c.potential_profit_min)}–${pln(c.potential_profit_max)}</b></div><div class="stat"><small>Ocena stanu</small><b>${c.overall_condition_score}/10</b></div><div class="stat"><small>Poziom ryzyka</small><span class="badge ${c.risk_level}">${c.risk_level}</span></div></div></div>
<section class="detail"><div class="sectionTitle"><h3>Najważniejsze ryzyka</h3><span class="muted">${high.length} wysokich • ${medium.length} średnich</span></div><div class="riskList">${high.concat(medium).slice(0,6).map(x=>`<div class="riskItem ${x.severity}"><b>${esc(x.element)}</b> <span class="badge ${x.severity}">${x.severity}</span><div>${esc(x.description)}</div></div>`).join('')||'<p class="muted">Brak istotnych ryzyk w danych.</p>'}</div></section>
<section class="detail"><div class="sectionTitle"><h3>Wszystkie uszkodzenia</h3><span class="muted">${d.length} wpisów</span></div>${tbl(d,[['Kategoria','category'],['Element','element'],['Opis','description'],['Waga','severity']])}</section>
<section class="detail"><div class="sectionTitle"><h3>Opony</h3><span class="muted">${t.length} szt.</span></div>${tbl(t,[['Pozycja','position'],['Marka','brand'],['Model','model'],['Rozmiar','size'],['Bieżnik','tread_depth_mm']])}</section>
<section class="detail"><div class="sectionTitle"><h3>Pomiary lakieru</h3><span class="muted">${p.length} pomiarów</span></div>${tbl(p,[['Element','element'],['Min µm','thickness_min_um'],['Max µm','thickness_max_um'],['Lakierowany','painted'],['Naprawiany','repaired']])}</section>`}catch(e){body.innerHTML=`<p class="error">${esc(e.message)}</p>`}}
async function load(){cars=await req('car_ranking?select=*&order=ranking.asc');render()}
form.onsubmit=async e=>{e.preventDefault();err.textContent='';try{let r=await fetch(`${BASE}/auth/v1/token?grant_type=password`,{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})}),d=await r.json();if(!r.ok)throw Error(d.error_description||d.msg);token=d.access_token;localStorage.setItem('car_token',token);showApp(true);await load()}catch(e){err.textContent=e.message}}
logout.onclick=()=>{localStorage.removeItem('car_token');location.reload()};document.getElementById('close').addEventListener('click',()=>document.getElementById('modal').classList.add('hidden'));document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.add('hidden')});search.oninput=render;risk.onchange=render;
(async()=>{token=localStorage.getItem('car_token');if(token){showApp(true);try{await load()}catch(e){localStorage.removeItem('car_token');location.reload()}}})();
</script></body></html>
